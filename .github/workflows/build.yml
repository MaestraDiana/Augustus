name: Build & Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-15
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      # Install Python dependencies + PyInstaller
      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install "pyinstaller>=6.0.0"

      # Bundle Python backend with PyInstaller
      - name: Build backend (PyInstaller)
        run: python build_backend.py
        working-directory: backend

      # Verify PyInstaller output exists
      - name: Verify backend build
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            test -f backend/dist/augustus/augustus.exe && echo "Backend binary found" || (echo "Backend binary NOT found!" && exit 1)
          else
            test -f backend/dist/augustus/augustus && echo "Backend binary found" || (echo "Backend binary NOT found!" && exit 1)
          fi

      # Build frontend (Vite)
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # Build Electron app — publish never; artifacts uploaded separately
      - name: Install Electron dependencies
        run: npm ci
        working-directory: electron

      - name: Build Electron app
        run: npx electron-builder --publish never
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (configure these secrets when ready):
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Windows code signing:
          # CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      # Collect built artifacts into a staging directory
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p staging
          # Copy release files (installers, blockmaps, latest ymls) but not unpacked dirs
          find electron/dist -maxdepth 1 -type f \( \
            -name "*.exe" -o -name "*.exe.blockmap" \
            -o -name "*.dmg" -o -name "*.dmg.blockmap" \
            -o -name "*.AppImage" \
            -o -name "latest*.yml" \
          \) -exec cp {} staging/ \;
          echo "Staged files:"
          ls -lh staging/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: staging/
          retention-days: 1

  # Publish release after ALL platform builds complete — no race condition
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List collected artifacts
        run: ls -lh dist/

      - name: Create and publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Creating release for tag: $TAG"
          gh release create "$TAG" \
            --repo "$GH_REPO" \
            --title "$TAG" \
            --generate-notes \
            dist/*
          echo "Release $TAG published with all artifacts."
