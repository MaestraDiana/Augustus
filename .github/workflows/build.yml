name: Build & Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-13
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      # Install Python dependencies + PyInstaller
      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install "pyinstaller>=6.0.0"

      # Bundle Python backend with PyInstaller
      - name: Build backend (PyInstaller)
        run: python build_backend.py
        working-directory: backend

      # Verify PyInstaller output exists
      - name: Verify backend build
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            test -f backend/dist/augustus/augustus.exe && echo "Backend binary found" || (echo "Backend binary NOT found!" && exit 1)
          else
            test -f backend/dist/augustus/augustus && echo "Backend binary found" || (echo "Backend binary NOT found!" && exit 1)
          fi

      # Build frontend (Vite)
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # Build Electron app
      - name: Install Electron dependencies
        run: npm ci
        working-directory: electron

      - name: Build and publish Electron app
        run: npx electron-builder --publish always
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (configure these secrets when ready):
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Windows code signing:
          # CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

  # Publish the draft release after all platform builds succeed
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Looking for draft release for tag: $TAG"
          # Find the draft release created by electron-builder
          RELEASE_ID=$(gh api repos/$GH_REPO/releases --jq ".[] | select(.draft==true and (.tag_name==\"$TAG\" or .tag_name==\"untagged-\" + .id)) | .id" | head -1)
          if [ -z "$RELEASE_ID" ]; then
            # electron-builder may create with empty tag — find most recent draft
            RELEASE_ID=$(gh api repos/$GH_REPO/releases --jq '[.[] | select(.draft==true)] | sort_by(.created_at) | last | .id')
          fi
          if [ -n "$RELEASE_ID" ]; then
            echo "Publishing draft release ID: $RELEASE_ID"
            gh api --method PATCH repos/$GH_REPO/releases/$RELEASE_ID \
              -f tag_name="$TAG" \
              -F draft=false \
              -f name="$TAG"
            echo "Release published!"
          else
            echo "No draft release found — creating release from tag"
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
